<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabellenrechner · 2. Bundesliga Süd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --surface-hover: #fafaf8;
    --border: #e2e0dc;
    --border-light: #eceae6;
    --text: #1a1917;
    --text-muted: #8a8782;
    --text-light: #b5b2ad;
    --accent: #1a1917;
    --accent-soft: #f0ede8;
    --green: #2d6a4f;
    --green-bg: #f0f7f4;
    --amber: #92540a;
    --amber-bg: #fef8f0;
    --red: #9b2335;
    --red-bg: #fdf2f4;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  header {
    max-width: 960px;
    margin: 0 auto 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .header-left p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-reset {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover {
    background: var(--accent-soft);
    color: var(--text);
    border-color: var(--text-light);
  }

  .layout {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── TABLE PANEL ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .panel-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  thead th {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-light);
    padding: 9px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border-light);
    background: var(--bg);
  }

  thead th:first-child,
  thead th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface-hover); }

  tbody td {
    padding: 9px 10px;
    text-align: right;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
  }

  td.rank {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-light);
    text-align: center;
    width: 28px;
  }

  td.team-name {
    font-family: var(--sans);
    font-weight: 500;
    color: var(--text);
    text-align: left;
    font-size: 13.5px;
    min-width: 80px;
  }

  td.pts {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
  }

  td.pts-diff { font-size: 12px; font-family: var(--mono); font-weight: 500; }
  td.pts-diff.positive { color: var(--green); background: var(--green-bg); border-radius: 3px; }
  td.pts-diff.negative { color: var(--red); background: var(--red-bg); border-radius: 3px; }
  td.pts-diff.neutral { color: var(--text-light); }

  td.pts {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }

  .rank-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .rank-mid { background: transparent; color: var(--text-light); }

  /* Zone dividers */
  tbody tr.zone-divider-promotion td {
    border-top: 2px solid #2d6a4f;
  }
  tbody tr.zone-divider-relegation td {
    border-top: 2px solid #9b2335;
  }

  /* Promotion badge on rank 1 */
  .rank-promotion { background: #d4eddf; color: #1a5c38 !important; }
  .rank-relegation { background: var(--red-bg); color: var(--red) !important; }

  /* ── FIXTURES PANEL ── */
  .fixtures-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .matchday-group {
    border-bottom: 1px solid var(--border-light);
  }
  .matchday-group:last-child { border-bottom: none; }

  .matchday-label {
    padding: 10px 16px 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-light);
    background: var(--bg);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .matchday-label .count {
    font-family: var(--mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9px;
    color: var(--text-muted);
  }

  .fixture-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
  }
  .fixture-row:last-child { border-bottom: none; }
  .fixture-row:hover { background: var(--surface-hover); }

  .fixture-home { text-align: right; }
  .fixture-away { text-align: left; }

  .fixture-home,
  .fixture-away {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .fixture-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 100px;
  }

  .score-inputs {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .score-inputs input[type="number"] {
    width: 34px;
    height: 30px;
    text-align: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -moz-appearance: textfield;
  }
  .score-inputs input::-webkit-outer-spin-button,
  .score-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-inputs input:focus {
    border-color: var(--accent);
    background: var(--surface);
  }
  .score-inputs input.filled {
    background: var(--surface);
    border-color: var(--border);
  }

  .score-sep {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-light);
    user-select: none;
  }

  /* Shootout toggle */
  .so-wrap {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .so-wrap.visible { display: flex; }

  .so-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    white-space: nowrap;
  }

  .so-buttons {
    display: flex;
    gap: 3px;
  }

  .so-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .so-btn:hover { border-color: var(--text-light); color: var(--text); }
  .so-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .result-tag {
    display: none;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .result-tag.win { background: var(--green-bg); color: var(--green); }
  .result-tag.draw { background: var(--amber-bg); color: var(--amber); }
  .result-tag.loss { background: var(--red-bg); color: var(--red); }

  /* Progress bar */
  .progress-wrap {
    padding: 10px 18px 12px;
    border-top: 1px solid var(--border-light);
    background: var(--bg);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Team highlights */
  .fixture-row.highlight-htc {
    background: #f0f4fb;
    border-left: 3px solid #4a7fc1;
  }
  .fixture-row.highlight-htc:hover { background: #e8eef7; }
  .fixture-row.highlight-htc .fixture-home,
  .fixture-row.highlight-htc .fixture-away { color: #2a5298; }

  .fixture-row.highlight-relegation {
    background: #f7f7f6;
    border-left: 3px solid #c8c5bf;
  }
  .fixture-row.highlight-relegation:hover { background: #f2f1ef; }
  .fixture-row.highlight-relegation .fixture-home,
  .fixture-row.highlight-relegation .fixture-away { color: #6b6860; }

  /* Table row highlights */
  tbody tr.highlight-htc { background: #f0f4fb; }
  tbody tr.highlight-htc:hover { background: #e8eef7; }
  tbody tr.highlight-htc td.team-name { color: #2a5298; font-weight: 600; }

  tbody tr.highlight-relegation { background: #f7f7f6; }
  tbody tr.highlight-relegation:hover { background: #f2f1ef; }
  tbody tr.highlight-relegation td.team-name { color: #6b6860; }

  .legend {
    max-width: 960px;
    margin: 12px auto 0;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend-dot.htc { background: #4a7fc1; }
  .legend-dot.relegation { background: #c8c5bf; }

  .note {
    font-size: 11px;
    color: var(--text-light);
    padding: 12px 18px;
    background: var(--bg);
    border-top: 1px solid var(--border-light);
    line-height: 1.5;
  }

  .note strong { color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Tabellenrechner</h1>
    <p>2. Bundesliga Süd · Feldhockey · Saison 2025/26</p>
  </div>
  <div class="header-right">
    <button class="btn-reset" onclick="resetAll()">Zurücksetzen</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2d6a4f"></div> Aufstieg (Platz 1)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9b2335"></div> Abstieg (Platz 8–10)</div>
  <div class="legend-item"><div class="legend-dot htc"></div> HTC Stuttgarter Kickers</div>
  <div class="legend-item"><div class="legend-dot relegation"></div> Abstiegskampf</div>
</div>

<div class="layout">

  <!-- LEFT: STANDINGS TABLE -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Tabelle</span>
      <span class="panel-badge" id="games-played-badge">—</span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="text-align:center">#</th>
          <th>Team</th>
          <th title="Spiele">Sp</th>
          <th title="Tore">Tore</th>
          <th title="Tordifferenz">TD</th>
          <th title="Punkte">Pkt</th>
        </tr>
      </thead>
      <tbody id="standings-body"></tbody>
    </table>
    <div class="note">
      <strong>3</strong> Pkt. Sieg · <strong>2</strong> SO-Sieg · <strong>1</strong> SO-Niederlage · <strong>0</strong> Niederlage
    </div>
  </div>

  <!-- RIGHT: FIXTURES -->
  <div class="fixtures-panel">
    <div class="panel-header">
      <span class="panel-title">Ausstehende Spiele</span>
      <span class="panel-badge" id="remaining-badge">—</span>
    </div>
    <div id="fixtures-container"></div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Eingegeben</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

// Full names for display in table
const TEAM_NAMES = {
  BHC:  'Berliner HC',
  ZW:   'Zehlendorfer Wespen',
  BWB:  'TC BW Berlin',
  WTHC: 'Wiesbadener THC',
  NHTC: 'Nürnberger HTC',
  HTC:  'HTC Stuttgarter Kickers',
  HGN:  'HG Nürnberg',
  TGF:  'TG Frankenthal',
  HCL:  'HC Ludwigsburg',
  CHC:  'Cöthener HC 02',
};

// Sp=games, S=wins(normal), SnP=SO wins, U=draws(SO losses), N=losses
// pts formula: S*3 + SnP*2 + U*1
// gf:ga from screenshot
const BASE_STANDINGS = {
  BHC:  { pts: 33, played: 12, w: 11, d: 2, l: 0, gf: 62, ga: 13 },
  ZW:   { pts: 30, played: 12, w: 11, d: 3, l: 1, gf: 50, ga: 21 },
  BWB:  { pts: 22, played: 12, w:  7, d: 3, l: 3, gf: 31, ga: 25 },
  WTHC: { pts: 22, played: 12, w:  7, d: 1, l: 4, gf: 32, ga: 31 },
  NHTC: { pts: 19, played: 12, w:  7, d: 2, l: 5, gf: 33, ga: 27 },
  HTC:  { pts: 18, played: 13, w:  6, d: 2, l: 6, gf: 25, ga: 29 },
  HGN:  { pts: 14, played: 12, w:  4, d: 2, l: 6, gf: 23, ga: 40 },
  TGF:  { pts: 13, played: 13, w:  5, d: 2, l: 8, gf: 17, ga: 40 },
  HCL:  { pts: 12, played: 12, w:  3, d: 3, l: 6, gf: 24, ga: 29 },
  CHC:  { pts:  0, played: 12, w:  0, d: 0, l:12, gf: 18, ga: 60 },
};

// Note: LuBu appears in 03.05 fixture but is not in the table — included as external team
const FIXTURES = [
  // 03.05
  { date: '03.05.', home: 'LuBu', away: 'NHTC', id: 'f0' },
  // 09.05
  { date: '09.05.', home: 'HTC',  away: 'BHC',  id: 'f1' },
  { date: '09.05.', home: 'WTHC', away: 'ZW',   id: 'f2' },
  { date: '09.05.', home: 'BWB',  away: 'HCL',  id: 'f3' },
  { date: '09.05.', home: 'TGF',  away: 'NHTC', id: 'f4' },
  { date: '09.05.', home: 'CHC',  away: 'HGN',  id: 'f5' },
  // 10.05
  { date: '10.05.', home: 'BWB',  away: 'HGN',  id: 'f6' },
  { date: '10.05.', home: 'HTC',  away: 'ZW',   id: 'f7' },
  { date: '10.05.', home: 'WTHC', away: 'BHC',  id: 'f8' },
  { date: '10.05.', home: 'CHC',  away: 'HCL',  id: 'f9' },
  // 16.05
  { date: '16.05.', home: 'NHTC', away: 'HTC',  id: 'f10' },
  { date: '16.05.', home: 'BHC',  away: 'BWB',  id: 'f11' },
  { date: '16.05.', home: 'ZW',   away: 'CHC',  id: 'f12' },
  { date: '16.05.', home: 'TGF',  away: 'HGN',  id: 'f13' },
  { date: '16.05.', home: 'HCL',  away: 'WTHC', id: 'f14' },
  // 06.06
  { date: '06.06.', home: 'NHTC', away: 'BHC',  id: 'f15' },
  { date: '06.06.', home: 'HGN',  away: 'ZW',   id: 'f16' },
  { date: '06.06.', home: 'CHC',  away: 'TGF',  id: 'f17' },
  { date: '06.06.', home: 'BWB',  away: 'WTHC', id: 'f18' },
  { date: '06.06.', home: 'HCL',  away: 'HTC',  id: 'f19' },
  // 07.06
  { date: '07.06.', home: 'BWB',  away: 'TGF',  id: 'f20' },
  { date: '07.06.', home: 'NHTC', away: 'ZW',   id: 'f21' },
  { date: '07.06.', home: 'HGN',  away: 'BHC',  id: 'f22' },
  { date: '07.06.', home: 'CHC',  away: 'WTHC', id: 'f23' },
  // 14.06
  { date: '14.06.', home: 'ZW',   away: 'BHC',  id: 'f24' },
  { date: '14.06.', home: 'HTC',  away: 'TGF',  id: 'f25' },
  { date: '14.06.', home: 'HCL',  away: 'HGN',  id: 'f26' },
  { date: '14.06.', home: 'CHC',  away: 'BWB',  id: 'f27' },
  { date: '14.06.', home: 'WTHC', away: 'NHTC', id: 'f28' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────

let results = {}; // id -> { homeGoals, awayGoals, so: null | 'home' | 'away' }

// ── RENDER FIXTURES ───────────────────────────────────────────────────────────

function groupByDate(fixtures) {
  const groups = {};
  fixtures.forEach(f => {
    if (!groups[f.date]) groups[f.date] = [];
    groups[f.date].push(f);
  });
  return groups;
}

function buildFixtures() {
  const container = document.getElementById('fixtures-container');
  container.innerHTML = '';
  const groups = groupByDate(FIXTURES);

  Object.entries(groups).forEach(([date, matches]) => {
    const group = document.createElement('div');
    group.className = 'matchday-group';

    const label = document.createElement('div');
    label.className = 'matchday-label';
    label.innerHTML = `${date} <span class="count">${matches.length} Spiele</span>`;
    group.appendChild(label);

    matches.forEach(f => {
      group.appendChild(buildFixtureRow(f));
    });

    container.appendChild(group);
  });
}

const HTC_TEAMS = ['HTC'];
const RELEGATION_TEAMS = ['NHTC', 'HGN', 'TGF', 'HCL'];

function getFixtureHighlight(f) {
  const teams = [f.home, f.away];
  if (teams.some(t => HTC_TEAMS.includes(t))) return 'highlight-htc';
  if (teams.some(t => RELEGATION_TEAMS.includes(t))) return 'highlight-relegation';
  return '';
}

function buildFixtureRow(f) {
  const row = document.createElement('div');
  const hl = getFixtureHighlight(f);
  row.className = `fixture-row${hl ? ' ' + hl : ''}`;
  row.id = `row-${f.id}`;

  const r = results[f.id] || {};

  row.innerHTML = `
    <div class="fixture-home">
      ${TEAM_NAMES[f.home] || f.home}
      <span class="result-tag" id="tag-home-${f.id}"></span>
    </div>
    <div class="fixture-score">
      <div class="score-inputs">
        <input type="number" min="0" max="99" id="h-${f.id}"
          value="${r.homeGoals !== undefined ? r.homeGoals : ''}"
          placeholder="—"
          oninput="onScoreInput('${f.id}')">
        <span class="score-sep">:</span>
        <input type="number" min="0" max="99" id="a-${f.id}"
          value="${r.awayGoals !== undefined ? r.awayGoals : ''}"
          placeholder="—"
          oninput="onScoreInput('${f.id}')">
      </div>
      <div class="so-wrap" id="so-${f.id}">
        <span class="so-label">SO:</span>
        <div class="so-buttons">
          <button class="so-btn ${r.so === 'home' ? 'active' : ''}"
            onclick="setSO('${f.id}','home')">${TEAM_NAMES[f.home] || f.home}</button>
          <button class="so-btn ${r.so === 'away' ? 'active' : ''}"
            onclick="setSO('${f.id}','away')">${TEAM_NAMES[f.away] || f.away}</button>
        </div>
      </div>
    </div>
    <div class="fixture-away">
      <span class="result-tag" id="tag-away-${f.id}"></span>
      ${TEAM_NAMES[f.away] || f.away}
    </div>
  `;

  return row;
}

// ── INPUT HANDLERS ────────────────────────────────────────────────────────────

function onScoreInput(id) {
  const hEl = document.getElementById(`h-${id}`);
  const aEl = document.getElementById(`a-${id}`);
  const hVal = hEl.value.trim();
  const aVal = aEl.value.trim();

  if (hVal !== '') hEl.classList.add('filled'); else hEl.classList.remove('filled');
  if (aVal !== '') aEl.classList.add('filled'); else aEl.classList.remove('filled');

  if (hVal === '' || aVal === '') {
    delete results[id];
    hideSO(id);
    updateResultTags(id, null, null, null);
    recalculate();
    return;
  }

  const h = parseInt(hVal), a = parseInt(aVal);

  if (isNaN(h) || isNaN(a)) return;

  const isDraw = h === a;
  const soWrap = document.getElementById(`so-${id}`);

  if (isDraw) {
    soWrap.classList.add('visible');
    const existing = results[id] ? results[id].so : null;
    results[id] = { homeGoals: h, awayGoals: a, so: existing };
  } else {
    hideSO(id);
    results[id] = { homeGoals: h, awayGoals: a, so: null };
  }

  updateResultTags(id, h, a, results[id].so);
  recalculate();
}

function hideSO(id) {
  const soWrap = document.getElementById(`so-${id}`);
  if (soWrap) soWrap.classList.remove('visible');
  if (results[id]) results[id].so = null;
  // Reset SO button states
  document.querySelectorAll(`#so-${id} .so-btn`).forEach(b => b.classList.remove('active'));
}

function setSO(id, winner) {
  if (!results[id]) return;
  results[id].so = winner;
  document.querySelectorAll(`#so-${id} .so-btn`).forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`#so-${id} .so-btn`).forEach((b, i) => {
    if ((i === 0 && winner === 'home') || (i === 1 && winner === 'away')) b.classList.add('active');
  });
  const r = results[id];
  updateResultTags(id, r.homeGoals, r.awayGoals, winner);
  recalculate();
}

function updateResultTags(id, h, a, so) {
  const tagH = document.getElementById(`tag-home-${id}`);
  const tagA = document.getElementById(`tag-away-${id}`);

  if (h === null || a === null) {
    tagH.style.display = 'none';
    tagA.style.display = 'none';
    return;
  }

  tagH.style.display = 'inline';
  tagA.style.display = 'inline';

  if (h > a) {
    setTag(tagH, 'win', 'Sieg'); setTag(tagA, 'loss', 'Nied.');
  } else if (a > h) {
    setTag(tagH, 'loss', 'Nied.'); setTag(tagA, 'win', 'Sieg');
  } else {
    // draw
    if (!so) {
      setTag(tagH, 'draw', 'U'); setTag(tagA, 'draw', 'U');
    } else if (so === 'home') {
      setTag(tagH, 'win', 'SO'); setTag(tagA, 'draw', 'SO');
    } else {
      setTag(tagH, 'draw', 'SO'); setTag(tagA, 'win', 'SO');
    }
  }
}

function setTag(el, cls, text) {
  el.className = `result-tag ${cls}`;
  el.textContent = text;
  el.style.display = 'inline';
}

// ── CALCULATE TABLE ───────────────────────────────────────────────────────────

function recalculate() {
  // Deep copy base standings
  const table = {};
  Object.entries(BASE_STANDINGS).forEach(([team, s]) => {
    table[team] = { ...s };
  });

  let filled = 0;
  const total = FIXTURES.length;

  FIXTURES.forEach(f => {
    const r = results[f.id];
    if (!r || r.homeGoals === undefined || r.awayGoals === undefined) return;

    filled++;
    const h = r.homeGoals, a = r.awayGoals, so = r.so;

    // Only credit table teams (LuBu is an away team in one game but not in table)
    const homeInTable = table[f.home];
    const awayInTable = table[f.away];

    if (homeInTable) {
      homeInTable.played++;
      homeInTable.gf += h;
      homeInTable.ga += a;
    }
    if (awayInTable) {
      awayInTable.played++;
      awayInTable.gf += a;
      awayInTable.ga += h;
    }

    if (h > a) {
      // Home win
      if (homeInTable) { homeInTable.pts += 3; homeInTable.w++; }
      if (awayInTable) { awayInTable.l++; }
    } else if (a > h) {
      // Away win
      if (awayInTable) { awayInTable.pts += 3; awayInTable.w++; }
      if (homeInTable) { homeInTable.l++; }
    } else {
      // Draw
      if (so === 'home') {
        if (homeInTable) { homeInTable.pts += 2; homeInTable.w++; }
        if (awayInTable) { awayInTable.pts += 1; awayInTable.d++; }
      } else if (so === 'away') {
        if (awayInTable) { awayInTable.pts += 2; awayInTable.w++; }
        if (homeInTable) { homeInTable.pts += 1; homeInTable.d++; }
      } else {
        // Draw without SO yet — give 1 pt each as placeholder
        if (homeInTable) { homeInTable.pts += 1; homeInTable.d++; }
        if (awayInTable) { awayInTable.pts += 1; awayInTable.d++; }
      }
    }
  });

  // Sort: pts desc → goal diff desc → goals scored desc → alphabetical
  const sorted = Object.entries(table).sort(([,a],[,b]) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gdA = a.gf - a.ga, gdB = b.gf - b.ga;
    if (gdB !== gdA) return gdB - gdA;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return 0;
  });

  renderTable(sorted);
  updateProgress(filled, total);
}

function renderTable(sorted) {
  const tbody = document.getElementById('standings-body');
  tbody.innerHTML = '';
  const total = sorted.length;

  sorted.forEach(([team, s], i) => {
    const rank = i + 1;
    const gd = s.gf - s.ga;
    const gdStr = gd > 0 ? `+${gd}` : `${gd}`;
    const gdClass = gd > 0 ? 'positive' : gd < 0 ? 'negative' : 'neutral';

    // Rank badge: promotion (1), mid, relegation (8-10)
    let rankClass = 'rank-mid';
    if (rank === 1) rankClass = 'rank-promotion';
    else if (rank >= total - 2) rankClass = 'rank-relegation';

    const tr = document.createElement('tr');

    // Zone divider classes
    if (rank === 2) tr.classList.add('zone-divider-promotion');
    if (rank === total - 2) tr.classList.add('zone-divider-relegation');

    // Team colour highlights
    if (HTC_TEAMS.includes(team)) tr.classList.add('highlight-htc');
    else if (RELEGATION_TEAMS.includes(team)) tr.classList.add('highlight-relegation');

    tr.innerHTML = `
      <td class="rank"><span class="rank-num ${rankClass}">${rank}</span></td>
      <td class="team-name" title="${team}">${TEAM_NAMES[team] || team}</td>
      <td>${s.played}</td>
      <td>${s.gf}:${s.ga}</td>
      <td class="pts-diff ${gdClass}">${gdStr}</td>
      <td class="pts">${s.pts}</td>
    `;
    tbody.appendChild(tr);
  });

  const addedGames = Object.values(results).length;
  document.getElementById('games-played-badge').textContent =
    addedGames > 0 ? `+${addedGames} Spiele` : 'Ausgangslage';
}

function updateProgress(filled, total) {
  document.getElementById('progress-text').textContent = `${filled} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(filled / total * 100).toFixed(1)}%`;
  document.getElementById('remaining-badge').textContent = `${total - filled} offen`;
}

// ── RESET ─────────────────────────────────────────────────────────────────────

function resetAll() {
  results = {};
  buildFixtures();
  recalculate();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

buildFixtures();
recalculate();
</script>
